name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Clippy
        run: cargo clippy --verbose --all-features
  miri:
    runs-on: ubuntu-latest
    env:
      # Explore many thread interleavings of the lock-free Treiber stack.
      MIRIFLAGS: "-Zmiri-many-seeds=0..16"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Miri (buffer pool)
        run: cargo +nightly miri test --lib --features tokio-async miri_
